name: Release

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: yarn
      - run: yarn workspace dingle-bot build

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: danielwuhoo/dingle-unleashed

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./packages/bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
      - run: yarn

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: danielwuhoo/dingle-activity

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./packages/activity/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build, build-activity]
    steps:
      - uses: actions/checkout@v3

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.BRISKET_LOVE_HOST }}
          username: ${{ secrets.BRISKET_LOVE_USER }}
          key: ${{ secrets.BRISKET_LOVE_SSH_KEY }}
          port: 6969
          source: docker-compose.yml
          target: ~/deploy

      - name: Deploy via docker compose
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.BRISKET_LOVE_HOST }}
          username: ${{ secrets.BRISKET_LOVE_USER }}
          key: ${{ secrets.BRISKET_LOVE_SSH_KEY }}
          port: 6969
          script: |
            cd ~/deploy
            docker-compose pull
            docker-compose up -d
            docker image prune -af
